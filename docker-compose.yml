services:
  nasmon:
    build: .
    container_name: nasmon
    restart: unless-stopped
    volumes:
      - /proc:/proc:ro
      - /sys:/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/apps/nasmon:/config
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nasmon.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.nasmon.entrypoints=websecure"
      - "traefik.http.routers.nasmon.tls=true"
      - "traefik.http.services.nasmon.loadbalancer.server.port=8000"

networks:
  traefik:
    external: true
